slots: 2
roles:
  validator: {harness: codex, model: gpt-5.4-mini, prompt: prompts/validator.md}
  worker: {harness: codex, model: gpt-5.4, prompt: prompts/worker.md,
           required_capabilities: [structured_events, native_result_schema, resume_session]}
  verifier: {harness: codex, model: gpt-5.4, prompt: prompts/verify-review.md}
validate: {semantic: false}
retries_cap: 2
# Network access is ordinary by default. Set this true only when every issue marked
# `Network: true` must wait for an explicit `orchestra release` before dispatch.
hold_network_issues: false
harnesses:
  codex:
    kind: codex
    executable: codex
    reasoning_effort: high
    sandbox: danger-full-access
    extra_args: ["--skip-git-repo-check", "--enable", "multi_agent"]
    attempts_cap: 3
    limits: {wall_seconds: 14400, idle_seconds: 900, active_tool_seconds: 7200, grace_seconds: 20}
  claude:
    kind: claude
    executable: claude
    reasoning_effort: high
    sandbox: danger-full-access
    attempts_cap: 3
    limits: {wall_seconds: 14400, idle_seconds: 900, active_tool_seconds: 7200, grace_seconds: 20}
sandbox: {enabled: true, kind: systemd, executable: systemd-run}
workflows:
  python:
    lint: "uv run ruff check"
    test: "uv run pytest"
    typecheck: "uv run mypy src"
verify: {rerun_checks: false}
review: {autoapprove: false}
template_path: projects/project-template
